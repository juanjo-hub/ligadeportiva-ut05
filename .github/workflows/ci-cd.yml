name: CI/CD - Liga Deportiva UT5

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ==============================================================
  # JOB 1 - Tests del frontend Angular (Karma + Jasmine)
  # ==============================================================
  test-frontend:
    name: Tests Frontend Angular
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar Chrome para tests headless
        uses: browser-actions/setup-chrome@v1

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar tests unitarios y de integración
        run: npm run test:ci
        env:
          CHROME_BIN: /usr/bin/google-chrome

  # ==============================================================
  # JOB 2 - Tests del backend Laravel (PHPUnit + Feature Tests)
  # ==============================================================
  test-backend:
    name: Tests Backend Laravel
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_sqlite, sqlite3, zip
          coverage: none

      - name: Instalar dependencias Composer
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Copiar .env.example a .env
        run: cp .env.example .env

      - name: Forzar SQLite para tests
        run: |
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
          sed -i 's/^DB_HOST=.*/# DB_HOST=/' .env
          sed -i 's/^DB_DATABASE=.*/# DB_DATABASE=/' .env
          sed -i 's/^DB_USERNAME=.*/# DB_USERNAME=/' .env
          sed -i 's/^DB_PASSWORD=.*/# DB_PASSWORD=/' .env
          touch database/database.sqlite

      - name: Generar APP_KEY
        run: php artisan key:generate

      - name: Ejecutar migraciones
        run: php artisan migrate --force

      - name: Ejecutar pruebas unitarias y Feature (PHPUnit)
        run: php artisan test

  # ==============================================================
  # JOB 3 - Deploy a Render (solo si los dos jobs anteriores pasan)
  # ==============================================================
  deploy:
    name: Deploy a Render
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Disparar deploy del FRONTEND en Render
        run: |
          curl -X POST \
            -H "Accept: application/json" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_FRONTEND_SERVICE_ID }}/deploys"

      - name: Disparar deploy del BACKEND en Render
        run: |
          curl -X POST \
            -H "Accept: application/json" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_BACKEND_SERVICE_ID }}/deploys"

      - name: Confirmar despliegue disparado
        run: echo "Despliegue de frontend y backend solicitado a Render correctamente."